resource:
    name: GuestCartCodes
    shortName: cart-codes
    description: 'Manage cart codes (vouchers and gift cards) on guest carts'

    processor: Spryker\Glue\CartCodesRestApi\Api\Storefront\Processor\GuestCartCodesStorefrontProcessor

    operations:
        - type: Post
          uriTemplate: '/guest-carts/{guestCartId}/cart-codes'
          uriVariables:
              guestCartId:
                  toProperty: 'guestCart'
                  fromClass: GuestCartsStorefrontResource

        - type: Delete
          uriTemplate: '/guest-carts/{guestCartId}/cart-codes/{code}'
          uriVariables:
              guestCartId:
                  identifiers: [guestCartId]
              code:
                  identifiers: [code]
          read: false
          output: false

    properties:
        code:
            type: string
            identifier: true
            writable: true
            readable: true
            required: true
            description: 'Cart code to apply to the guest cart'
            openapiContext:
                example: 'HAPPY2024'

        guestCart:
            type: GuestCartsStorefrontResource
            writable: false
            readable: false
            required: false
